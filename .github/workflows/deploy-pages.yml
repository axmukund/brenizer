name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: npm ci

      - name: Verify TypeScript
        run: npm run typecheck

      - name: Setup Emscripten
        shell: bash
        run: |
          git clone https://github.com/emscripten-core/emsdk.git "${RUNNER_TEMP}/emsdk"
          cd "${RUNNER_TEMP}/emsdk"
          EMSDK_PYTHON=python3 ./emsdk install 5.0.2
          EMSDK_PYTHON=python3 ./emsdk activate 5.0.2

      - name: Build
        shell: bash
        run: |
          source "${RUNNER_TEMP}/emsdk/emsdk_env.sh"
          em++ --version
          echo "EM_CONFIG=${EM_CONFIG}"
          test -x "${RUNNER_TEMP}/emsdk/upstream/bin/clang"
          npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
